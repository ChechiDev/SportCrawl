<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fbrefly</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        font-size: 14px;
        margin: 0;
        padding: 16px;
        width: 320px;
        background: #fff;
        color: #111;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 16px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
        color: #333;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        margin-bottom: 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
      }
      button {
        width: 100%;
        padding: 8px;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        min-height: 16px;
        color: #555;
      }
      #status.ok {
        color: #16a34a;
      }
      #status.err {
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <h1>fbrefly</h1>

    <label for="work_server_url">Work server URL</label>
    <input
      type="text"
      id="work_server_url"
      placeholder="http://localhost:9731"
    />

    <label for="work_server_token">Work server token</label>
    <input type="password" id="work_server_token" placeholder="Bearer token" />

    <button id="save">Save</button>
    <p id="status"></p>

    <script src="popup.js"></script>
  </body>
</html>
