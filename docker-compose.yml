services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB__NAME:-sportcrawl}
      POSTGRES_USER: ${DB__USER:-sportcrawl}
      POSTGRES_PASSWORD: ${DB__PASSWORD:?DB__PASSWORD required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB__USER:-sportcrawl} -d ${DB__NAME:-sportcrawl}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  chromium:
    build:
      context: .
      dockerfile: docker/Dockerfile.chromium
    ports:
      - "9222:9222"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9222/json/version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  work_server:
    image: python:3.12-alpine
    command: >
      python -c "
      print('work server stub');
      import time;
      time.sleep(999)
      "
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
